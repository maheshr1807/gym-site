  body{ background: linear-gradient(180deg, rgba(23,22,28,0.4), var(--bg) 60%), url('https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?auto=format&fit=crop&w=1800&q=50') center/cover fixed; }
  .form-error{ background: rgba(216,72,59,0.12); border:1px solid var(--crimson); color:#f2a49c; padding:12px 16px; border-radius:var(--radius-sm); font-size:0.85rem; margin-bottom:18px; display:none; }
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="brand"><span class="ring plate-marker" style="width:38px;height:38px;font-size:0.7rem;">FG</span><b>FORGE</b>&nbsp;FITNESS</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="programs.html">Programs</a>
      <a href="trainers.html">Trainers</a>

    </div>
    <div class="nav-cta">
      <a href="login.html" class="btn btn-gold btn-sm">Login</a>
    </div>
    <button class="nav-burger" aria-label="Menu"><span></span></button>
  </div>
  <div class="container mobile-panel">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="programs.html">Programs</a>
    <a href="trainers.html">Trainers</a>
    <a href="membership.html">Membership</a>
    <a href="schedule.html">Schedule</a>
    <a href="gallery.html">Gallery</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="active">Login / Register</a>
  </div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center" style="margin-bottom:24px;">
      <div class="plate-marker" style="margin:0 auto 12px;">FG</div>
      <h2 style="margin-bottom:4px;">Welcome To FORGE</h2>
      <p style="margin:0;font-size:0.88rem;">Log in to manage your bookings and membership.</p>
    </div>

    <div class="auth-tabs">
      <button class="active" data-target="panel-login">Login</button>
      <button data-target="panel-register">Register</button>
    </div>

    <div class="auth-panel active" id="panel-login">
      <div class="form-error" id="login-error"></div>
      <form id="login-form">
        <div class="field"><label for="login-email">Email</label><input type="email" id="login-email" required></div>
        <div class="field"><label for="login-password">Password</label><input type="password" id="login-password" required></div>
        <button type="submit" class="btn btn-gold btn-block">Log In</button>
        <p class="form-note" style="text-align:center;margin-top:16px;">Demo login: <b style="color:var(--gold);">demo@forge.fit</b> / <b style="color:var(--gold);">demo1234</b></p>
      </form>
    </div>

    <div class="auth-panel" id="panel-register">
      <div class="form-error" id="register-error"></div>
      <form id="register-form">
        <div class="field"><label for="reg-name">Full Name</label><input type="text" id="reg-name" required></div>
        <div class="field"><label for="reg-email">Email</label><input type="email" id="reg-email" required></div>
        <div class="field"><label for="reg-password">Password</label><input type="password" id="reg-password" minlength="6" required></div>
        <button type="submit" class="btn btn-gold btn-block">Create Account</button>
      </form>
    </div>

  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
